<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>英语 Cloze 复习库</title>
    <link rel="stylesheet" href="./styles.css?v=20260716-cloze-answer-status" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="年份">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div>
            <h1>Cloze</h1>
            <p>英语一 / 英语二 / 完形</p>
          </div>
        </div>
        <nav class="year-list" id="yearList"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <div class="eyebrow" id="modeLabel">真题训练</div>
            <h2 id="yearTitle">英语一</h2>
          </div>

          <div class="toolbar">
            <div class="segmented" role="tablist" aria-label="模式">
              <button class="segment is-active" id="studyMode" type="button">
                训练
              </button>
              <button class="segment" id="reviewMode" type="button">
                复习库
              </button>
            </div>
            <button class="icon-button" id="toggleAnswers" type="button" title="显示答案">
              ◐
            </button>
            <button class="icon-button hover-button" id="hoverReveal" type="button" title="关闭悬停显示" aria-label="Hover 显示答案">
              Hover
            </button>
            <div class="segmented font-size-control" role="group" aria-label="字体大小">
              <button class="segment" type="button" data-font-size="small">小</button>
              <button class="segment is-active" type="button" data-font-size="medium">中</button>
              <button class="segment" type="button" data-font-size="large">大</button>
            </div>
            <label class="search">
              <span>⌕</span>
              <input id="searchInput" type="search" placeholder="搜索" />
            </label>
          </div>
        </header>

        <nav class="review-rounds" id="reviewRounds" aria-label="复习轮次" hidden>
          <button class="review-round is-active" type="button" data-review-round="1">1 轮</button>
          <button class="review-round" type="button" data-review-round="2">2 轮</button>
          <button class="review-round" type="button" data-review-round="3">3 轮</button>
          <button class="review-round" type="button" data-review-round="4">4 轮</button>
        </nav>

        <section class="sync-card" id="syncCard">
          <div class="sync-copy">
            <strong id="syncTitle">本地模式</strong>
            <span id="syncDetail">配置 Supabase 后可跨设备同步复习库</span>
          </div>
          <form class="auth-form" id="authForm">
            <input id="emailInput" type="email" autocomplete="email" placeholder="邮箱" />
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="密码" />
            <button id="signInButton" type="submit">登录</button>
            <button id="signUpButton" type="button">注册</button>
            <button id="syncNowButton" type="button">同步</button>
            <button id="signOutButton" type="button">退出</button>
          </form>
        </section>

        <section class="stats-strip" id="statsStrip"></section>
        <section class="content" id="content"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <dialog class="source-dialog" id="sourceDialog" aria-labelledby="sourceTitle">
      <div class="annotation-dialog-head">
        <div>
          <span>原句回看</span>
          <strong id="sourceTitle">词条原句</strong>
        </div>
        <button class="annotation-close" id="sourceClose" type="button" aria-label="关闭" title="关闭">×</button>
      </div>
      <div class="source-dialog-body">
        <div class="source-sentence" id="sourceSentence"></div>
        <div class="source-translation">
          <span>翻译：</span>
          <p id="sourceTranslation"></p>
        </div>
        <p class="source-note" id="sourceNote" hidden></p>
      </div>
    </dialog>

    <dialog class="annotation-dialog" id="annotationDialog" aria-labelledby="annotationTitle">
      <div class="annotation-dialog-head">
        <div>
          <span>英文注释</span>
          <strong id="annotationTitle">添加注释</strong>
        </div>
        <button class="annotation-close" id="annotationCancel" type="button" aria-label="关闭" title="关闭">×</button>
      </div>
      <div class="annotation-selection" id="annotationSelection"></div>
      <label class="annotation-field">
        <span>注释内容</span>
        <textarea id="annotationInput" rows="5" maxlength="1000" placeholder="写下这处用法、辨析或提醒"></textarea>
      </label>
      <div class="annotation-actions">
        <button class="annotation-delete" id="annotationDelete" type="button">删除</button>
        <button class="annotation-save" id="annotationSave" type="button">保存</button>
      </div>
    </dialog>
    <div class="annotation-tooltip" id="annotationTooltip" role="tooltip" hidden></div>

    <script src="./data.js?v=20260716-english1-2018-corrected"></script>
    <script src="./data-english2.js?v=20260716-english2-2022"></script>
    <script src="./data-cloze.js?v=20260716-cloze-answer-status"></script>
    <script src="./sync-config.js"></script>
    <script src="./app.js?v=20260716-cloze-answer-status"></script>
  </body>
</html>
